<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variables en JavaScript</title>
</head>
<body>
    <h1>Abre la consola para ver resultados</h1>

    <script>

        var saludo = "Hola";
        console.log("var:", saludo);
        
        let nombre = "Juan";
        console.log("let:", nombre);

        const edad = 25;
        console.log("const:", edad); 



    </script>
</body>
</html>
